# Render blueprint for the Decklist API (the Express server).
# Deploy: push this repo to GitHub, then in Render → "New +" → "Blueprint" and
# pick the repo. Set ANTHROPIC_API_KEY in the dashboard when prompted.
services:
  - type: web
    name: decklist-api
    runtime: node
    plan: starter # paid (~$7/mo) — no sleep / no cold starts. Requires a payment method on the Render account.
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false # set this secret in the Render dashboard, not in git
